name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cliexec
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python
        run: uv python install 3.13

      - name: Run tests
        run: uv run --locked pytest

      - name: Run Ruff
        run: uv run --locked ruff check .

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl cliexec --help

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz cliexec --help

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.whl *.tar.gz > ../SHA256SUMS

      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          dist/*.whl dist/*.tar.gz SHA256SUMS --clobber

      - name: Publish distributions
        run: uv publish
