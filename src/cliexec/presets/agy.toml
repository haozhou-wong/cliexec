enabled = true
command = ["agy", "--print-timeout", "2h"]
success_exit_codes = [0]
allow_unrestricted = false

[input]
mode = "argv"
prompt_arg = "--print={prompt}"

[output]
format = "text"
collect = "last"

[modes.read_only]
args = ["--sandbox", "--mode", "plan"]

[modes.workspace_write]
args = ["--sandbox", "--mode", "accept-edits"]

[modes.unrestricted]
args = ["--mode", "accept-edits", "--dangerously-skip-permissions"]

[env]
pass = ["ANTHROPIC_API_KEY", "GOOGLE_API_KEY", "OPENAI_API_KEY"]

[probe]
version_args = ["--version"]
version_regex = '(?P<version>\d+\.\d+\.\d+)'
tested_versions = ">=1.1.2,<1.2.0"
help_args = ["--help"]
help_contains = [
  "--print",
  "--print-timeout",
  "--mode",
  "--sandbox",
  "--dangerously-skip-permissions",
]
